<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Smart Save - Flux</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #08080f; --bg2: #0e0e1a; --card: #12121e; --card2: #181828;
      --border: rgba(255,255,255,0.07); --border2: rgba(255,255,255,0.12);
      --white: #ffffff; --gray: #8888aa;
      --orange: #e8491d; --green2: #34d399;
    }
    body { background:var(--bg); color:var(--white); font-family:'Inter', sans-serif; overflow:hidden; height:100vh; }
    
    .navbar {
      position:fixed; top:18px; left:50%; transform:translateX(-50%); width:calc(100% - 40px); max-width:1280px;
      background:rgba(12,12,22,0.82); backdrop-filter:blur(20px); border:1px solid var(--border2); border-radius:28px;
      padding:0 26px; height:68px; display:flex; align-items:center; justify-content:space-between; z-index:1000;
    }
    .nav-brand { display:flex; align-items:center; gap:12px; text-decoration:none; color: white; }
    .nav-logo { width:38px; height:38px; border-radius:14px; background:linear-gradient(135deg,var(--orange),#ff8c42); display:flex; align-items:center; justify-content:center; font-weight:800; font-size:20px; }
    .btn-close { color:var(--gray); text-decoration:none; font-size:24px; padding: 0 10px; }
    .btn-close:hover { color:white; }

    #core-canvas { position: absolute; top:0; left:0; width:100%; height:100%; z-index: 1; }

    .ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; display:flex; flex-direction:column; align-items:center; justify-content:flex-end; padding-bottom: 80px; pointer-events: none; }
    
    .save-panel { background: rgba(18,18,30,0.85); backdrop-filter: blur(20px); border: 1px solid var(--border2); border-radius: 32px; padding: 40px; text-align: center; max-width: 500px; width: 90%; pointer-events: auto; animation: slideUp 0.6s cubic-bezier(0.2, 0.9, 0.4, 1.1); box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
    @keyframes slideUp { 0% { transform: translateY(50px); opacity: 0; } 100% { transform: translateY(0); opacity: 1; } }

    .save-panel h2 { font-size: 32px; font-weight: 800; margin-bottom: 12px; }
    .save-panel p { color: var(--gray); margin-bottom: 24px; line-height: 1.5; font-size: 15px; }

    .surplus-input { font-size: 48px; font-weight: 900; color: var(--green2); margin-left: 5px; margin-bottom: 30px; letter-spacing: -1px; text-shadow: 0 0 30px rgba(52,211,153,0.3); background: transparent; border: none; border-bottom: 2px dashed rgba(52,211,153,0.5); width: 180px; text-align: center; font-family: 'Inter', sans-serif; outline: none; transition: 0.2s; }
    .surplus-input:focus { border-bottom-color: var(--green2); background: rgba(52,211,153,0.05); }

    .btn-trigger { background: linear-gradient(135deg, var(--green2), #10b981); color: #000; font-size: 18px; font-weight: 700; width: 100%; padding: 20px; border-radius: 60px; border: none; cursor: pointer; transition: 0.2s; box-shadow: 0 10px 30px rgba(16,185,129,0.3); }
    .btn-trigger:hover { transform: translateY(-3px); box-shadow: 0 15px 40px rgba(16,185,129,0.5); }
    .btn-trigger:active { transform: translateY(0); }

    #success-msg { display: none; color: var(--green2); font-weight: 600; font-size: 18px; margin-top: 20px; }
  </style>
</head>
<body>

<nav class="navbar">
  <a href="index.html" class="nav-brand">
    <div class="nav-logo">⚡</div>
    <div style="font-weight:700; font-size:20px;">Flux</div>
  </a>
  <a href="index.html" class="btn-close">&times;</a>
</nav>

<canvas id="core-canvas"></canvas>

<div class="ui-layer">
  <div class="save-panel">
    <h2>Smart Save Trigger</h2>
    <p id="s-desc">Analyzing your wealth engine...</p>
    
    <div style="display:flex; justify-content:center; align-items:center;">
      <span style="font-size: 48px; font-weight: 900; color: var(--green2); margin-bottom:30px;">₹</span>
      <input type="number" class="surplus-input" id="s-amt-input" value="0">
    </div>
    
    <button class="btn-trigger" id="saveBtn" onclick="triggerSave()">Lock in Wealth</button>
    <div id="success-msg">✨ Surplus successfully routed to Wealth Engine!</div>
  </div>
</div>

<script>
  let coreMesh;
  let particleSystem;
  
  window.addEventListener('DOMContentLoaded', () => {
    const canvas = document.getElementById('core-canvas');
    const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);

    const scene = new THREE.Scene();
    // Dark radial background approximation
    scene.fog = new THREE.FogExp2(0x08080f, 0.05);

    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.z = 15;
    camera.position.y = 2; // Look slightly down

    // The Energy Core
    const coreGeo = new THREE.TorusKnotGeometry(2.5, 0.8, 100, 16);
    const coreMat = new THREE.MeshStandardMaterial({
      color: 0x34d399,
      emissive: 0x10b981,
      emissiveIntensity: 0.6,
      wireframe: true,
      transparent: true,
      opacity: 0.9
    });
    coreMesh = new THREE.Mesh(coreGeo, coreMat);
    scene.add(coreMesh);

    // Particles pulling into the core
    const pGeo = new THREE.BufferGeometry();
    const pCount = 800;
    const pPos = new Float32Array(pCount * 3);
    const pVel = [];
    for(let i=0; i<pCount*3; i+=3) {
      pPos[i] = (Math.random() - 0.5) * 30;
      pPos[i+1] = (Math.random() - 0.5) * 30;
      pPos[i+2] = (Math.random() - 0.5) * 30;
      pVel.push({
        x: (Math.random() - 0.5) * 0.05,
        y: (Math.random() - 0.5) * 0.05,
        z: (Math.random() - 0.5) * 0.05
      });
    }
    pGeo.setAttribute('position', new THREE.BufferAttribute(pPos, 3));
    const pMat = new THREE.PointsMaterial({ color: 0x1de9a0, size: 0.1, transparent:true, opacity:0.8 });
    particleSystem = new THREE.Points(pGeo, pMat);
    scene.add(particleSystem);

    const light = new THREE.PointLight(0x34d399, 2, 50);
    scene.add(light);
    scene.add(new THREE.AmbientLight(0xffffff, 0.2));

    const clock = new THREE.Clock();
    let speedMult = 1;

    function animate() {
      requestAnimationFrame(animate);
      const time = clock.getElapsedTime();

      // Rotate core
      coreMesh.rotation.x += 0.01 * speedMult;
      coreMesh.rotation.y += 0.015 * speedMult;
      
      // Pulse core
      const scale = 1 + Math.sin(time * 3) * 0.05 * speedMult;
      coreMesh.scale.set(scale, scale, scale);

      // Animate particles pulling towards center
      const positions = particleSystem.geometry.attributes.position.array;
      for(let i=0; i<pCount; i++) {
        let px = positions[i*3];
        let py = positions[i*3+1];
        let pz = positions[i*3+2];
        
        // Pull to center
        px -= px * 0.01 * speedMult;
        py -= py * 0.01 * speedMult;
        pz -= pz * 0.01 * speedMult;

        // Reset if too close
        if(Math.abs(px) < 0.5 && Math.abs(py) < 0.5 && Math.abs(pz) < 0.5) {
          px = (Math.random() - 0.5) * 30;
          py = (Math.random() - 0.5) * 30;
          pz = (Math.random() - 0.5) * 30;
        }

        positions[i*3] = px;
        positions[i*3+1] = py;
        positions[i*3+2] = pz;
      }
      particleSystem.geometry.attributes.position.needsUpdate = true;
      particleSystem.rotation.y += 0.002 * speedMult;

      renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // Make global for the button
    window.triggerSave = async function() {
      await initAppPromise;
      const inputAmt = parseFloat(document.getElementById('s-amt-input').value) || 0;
      const detectedSurplus = Math.max(0, inputAmt);

      speedMult = 10; // accelerate animation
      coreMesh.material.emissiveIntensity = 2.0;
      
      document.getElementById('saveBtn').style.display = 'none';
      document.getElementById('success-msg').style.display = 'block';
      
      // Add transaction actually locking wealth
      if(detectedSurplus > 0) {
        await smartSave(detectedSurplus);
      }
      
      setTimeout(() => {
        window.location.href = 'dashboard.html';
      }, 2500);
    }
  });
</script>
<script src="app.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', async () => {
    await initAppPromise;
    const { suggestion, amount } = await smartSaveSuggestion();
    document.getElementById('s-amt-input').value = Math.max(0, Math.round(amount));
    document.getElementById('s-desc').innerText = suggestion;
  });
</script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/annyang/2.6.1/annyang.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="global-voice.js"></script>
</body>
</html>
