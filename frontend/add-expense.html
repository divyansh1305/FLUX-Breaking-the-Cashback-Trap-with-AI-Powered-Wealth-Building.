<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Expense - Flux</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #08080f; --border: rgba(255,255,255,0.07);
      --white: #ffffff; --gray: #8888aa; --red: #ef4444; --red2: #f87171;
      --orange: #e8491d;
    }
    body { background:var(--bg); color:var(--white); font-family:'Inter', sans-serif; overflow:hidden; height:100vh; display:flex; align-items:center; justify-content:center; }
    
    #bg-canvas { position: absolute; top:0; left:0; width:100%; height:100%; z-index:0; opacity: 0.5; }
    
    .navbar { position:fixed; top:18px; left:50%; transform:translateX(-50%); width:calc(100% - 40px); max-width:1280px; background:rgba(12,12,22,0.82); backdrop-filter:blur(20px); border:1px solid var(--border); border-radius:28px; padding:0 26px; height:68px; display:flex; align-items:center; justify-content:space-between; z-index:1000; }
    .nav-brand { display:flex; align-items:center; gap:12px; text-decoration:none; color: white; font-weight:700; font-size:20px; }
    .nav-logo { width:38px; height:38px; border-radius:14px; background:linear-gradient(135deg,var(--orange),#ff8c42); display:flex; align-items:center; justify-content:center; font-weight:800; }
    .btn-close { color:var(--gray); text-decoration:none; font-size:24px; padding: 0 10px; }
    .btn-close:hover { color:white; }

    .form-container { position:relative; z-index:10; background:rgba(18,18,30,0.7); backdrop-filter:blur(20px); border:1px solid rgba(248,113,113,0.3); border-radius:32px; padding:40px; width:90%; max-width:450px; text-align:center; box-shadow:0 20px 50px rgba(0,0,0,0.5); }
    h2 { font-size:28px; margin-bottom: 24px; font-weight:800; color:var(--red2); }
    
    .input-grp { margin-bottom: 20px; text-align:left; }
    .input-grp label { display:block; font-size:13px; color:var(--gray); margin-bottom:8px; font-weight:600; text-transform:uppercase; letter-spacing:1px; }
    .input-grp input, .input-grp select, .input-grp textarea { width:100%; background:rgba(0,0,0,0.3); border:1px solid var(--border); color:white; padding:16px; border-radius:16px; font-size:16px; transition:0.2s; outline:none; }
    .input-grp input:focus, .input-grp select:focus, .input-grp textarea:focus { border-color:var(--red2); box-shadow:0 0 15px rgba(248,113,113,0.2); }
    
    .btn-submit { background:linear-gradient(135deg,var(--red2),var(--red)); color:#fff; width:100%; border:none; padding:16px; border-radius:40px; font-weight:700; font-size:16px; cursor:pointer; margin-top:10px; transition:0.2s; text-decoration:none; display:inline-block; }
    .btn-submit:hover { transform:translateY(-2px); box-shadow:0 10px 25px rgba(239,68,68,0.3); }

    .warning { font-size:12px; color:var(--gray); margin-top:16px; display:flex; align-items:center; justify-content:center; gap:6px; }

    .trap-detector {
      margin-top: 20px; background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.25);
      border-radius: 20px; padding: 18px; text-align: left; display: none;
      animation: trapSlide 0.3s ease;
    }
    .trap-detector.visible { display: block; }
    @keyframes trapSlide { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
    .trap-title { font-size: 13px; font-weight: 700; color: var(--red2); margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
    .trap-row { display: flex; justify-content: space-between; padding: 6px 0; font-size: 13px; }
    .trap-row .label { color: var(--gray); }
    .trap-row .val { font-weight: 700; }
    .trap-row .val.bad { color: var(--gray); text-decoration: line-through; }
    .trap-row .val.good { color: #34d399; }
    .trap-divider { height: 1px; background: rgba(255,255,255,0.07); margin: 8px 0; }
    .trap-verdict { font-size: 12px; color: #34d399; font-weight: 600; margin-top: 8px; text-align: center; padding: 8px; background: rgba(52,211,153,0.08); border-radius: 12px; }

  </style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<nav class="navbar">
  <a href="index.html" class="nav-brand"><div class="nav-logo">⚡</div>Flux</a>
  <a href="index.html" class="btn-close">&times;</a>
</nav>

<div class="form-container">
  <h2>Log Expense</h2>
  <form id="expenseForm">
    <div class="input-grp">
      <label>Amount (₹)</label>
      <input type="number" id="amt" placeholder="0.00" required>
    </div>
    <div class="input-grp">
      <label>Category</label>
      <select id="cat" required>
        <option value="Food & Dining">Food & Dining</option>
        <option value="Shopping">Shopping</option>
        <option value="Transport">Transport</option>
        <option value="Bills">Bills</option>
      </select>
    </div>
    <button type="submit" class="btn-submit">Record Spend</button>
    
    <!-- Cashback Trap Detector -->
    <div class="trap-detector" id="trapDetector">
      <div class="trap-title">💳 Cashback Trap Detector</div>
      <div class="trap-row">
        <span class="label">Your expense</span>
        <span class="val" id="trap-expense">₹0</span>
      </div>
      <div class="trap-row">
        <span class="label">Typical 2% cashback</span>
        <span class="val bad" id="trap-cashback">₹0</span>
      </div>
      <div class="trap-divider"></div>
      <div class="trap-row">
        <span class="label">Flux auto-invests (5%)</span>
        <span class="val good" id="trap-flux">₹0</span>
      </div>
      <div class="trap-row">
        <span class="label">Wealth multiplier</span>
        <span class="val good" id="trap-multi">2.5x more</span>
      </div>
      <div class="trap-verdict" id="trap-verdict">Flux generates 2.5x more wealth than cashback</div>
    </div>
    
    <div class="warning"><span>⚠️</span> Remember: Replacing non-essentials fuels your goals.</div>
  </form>
</div>
<script src="app.js"></script>
<script>
  // Cashback Trap Detector - live update
  const amtInput = document.getElementById('amt');
  const trapPanel = document.getElementById('trapDetector');
  
  amtInput.addEventListener('input', () => {
    const val = parseFloat(amtInput.value) || 0;
    if (val > 0) {
      trapPanel.classList.add('visible');
      const cashback = val * 0.02;
      const fluxInvest = val * 0.05;
      const multi = (fluxInvest / cashback).toFixed(1);
      document.getElementById('trap-expense').innerText = `₹${val.toLocaleString('en-IN')}`;
      document.getElementById('trap-cashback').innerText = `₹${cashback.toLocaleString('en-IN')}`;
      document.getElementById('trap-flux').innerText = `₹${fluxInvest.toLocaleString('en-IN')}`;
      document.getElementById('trap-multi').innerText = `${multi}x more`;
      document.getElementById('trap-verdict').innerText = `Flux generates ${multi}x more wealth than cashback`;
    } else {
      trapPanel.classList.remove('visible');
    }
  });

  document.getElementById('expenseForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const amt = document.getElementById('amt').value;
    const cat = document.getElementById('cat').value;
    
    // Check Pre-spend impact
    const impactRes = await fetch('/api/predict-impact', {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ amount: amt })
    });
    
    const impactData = await impactRes.json();
    
    if (impactData.is_overspending) {
        // OVERSPEND LOCKDOWN TOOL
        await Swal.fire({
          title: '🚨 BUDGET LOCKDOWN ENGAGED',
          html: `
            <div style="text-align: left; font-size: 14px; line-height: 1.5; color: #d1d5db;">
              This expense pushes you past 90% of your total income. Flux has temporarily locked this transaction to prevent severe wealth decay.<br><br>
              <span style="color:#ef4444; font-weight:bold;">- Blocked Amount: ₹${amt}</span><br>
              <span style="color:#f59e0b; font-weight:bold;">Status: Overspend Prevented</span>
            </div>
          `,
          icon: 'error',
          background: '#1a0505',
          color: '#fff',
          confirmButtonText: 'Understood',
          confirmButtonColor: '#ef4444'
        });
        document.getElementById('expenseForm').reset();
        trapPanel.classList.remove('visible');
        return;
    }
    
    // SweetAlert Modal decision engine
    const result = await Swal.fire({
      title: 'Pre-Spend Intelligence',
      html: `
        <div style="text-align: left; font-size: 14px; line-height: 1.5; color: #d1d5db;">
          ${impactData.message}<br><br>
          <span style="color:#ef4444; font-weight:bold;">- ${impactData.score_drop} FLUX Score</span><br>
          <span style="color:#f59e0b; font-weight:bold;">+ ${impactData.goal_delay} Days Goal Delay</span>
        </div>
      `,
      icon: 'warning',
      background: '#12121e',
      color: '#fff',
      showCancelButton: true,
      confirmButtonText: 'Continue Spend',
      cancelButtonText: 'Cancel & Save Money',
      confirmButtonColor: '#ef4444',
      cancelButtonColor: '#10b981'
    });
    
    if (result.isConfirmed) {
        await addExpense(cat, amt);
        window.location.href = 'index.html';
    } else {
        // User changed their mind - trigger confetti for good behavior!
        confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
        Swal.fire({
            title: "Great Decision!",
            text: "You just protected your wealth velocity.",
            icon: "success",
            background: '#12121e',
            color: '#fff',
            confirmButtonColor: '#10b981',
            timer: 2000
        });
        document.getElementById('expenseForm').reset();
        trapPanel.classList.remove('visible');
    }
  });
</script>

<script>
  // 3D Background - Falling Red Particles
  window.addEventListener('DOMContentLoaded', () => {
    const canvas = document.getElementById('bg-canvas');
    const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
    camera.position.z = 20;

    const pGeo = new THREE.BufferGeometry();
    const pCount = 300;
    const pPos = new Float32Array(pCount * 3);
    for(let i=0; i<pCount*3; i+=3){
      pPos[i] = (Math.random()-0.5)*40;
      pPos[i+1] = (Math.random()-0.5)*40;
      pPos[i+2] = (Math.random()-0.5)*20;
    }
    pGeo.setAttribute('position', new THREE.BufferAttribute(pPos, 3));
    const pMat = new THREE.PointsMaterial({ color: 0xf87171, size: 0.15, transparent:true, opacity:0.8 });
    const particles = new THREE.Points(pGeo, pMat);
    scene.add(particles);

    function animate() {
      requestAnimationFrame(animate);
      const pos = particles.geometry.attributes.position.array;
      for(let i=1; i<pCount*3; i+=3){
        pos[i] -= 0.05; // move down
        if(pos[i] < -20) pos[i] = 20;
      }
      particles.geometry.attributes.position.needsUpdate = true;
      particles.rotation.y += 0.001;
      renderer.render(scene, camera);
    }
    animate();
    
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth/window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  });
</script>
</body>
</html>
