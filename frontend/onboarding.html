<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Flux Onboarding</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background:#08080f; color:#fff; font-family:'Inter', sans-serif; display:flex; align-items:center; justify-content:center; min-height:100vh; overflow:hidden; }
    .bg-glow { position:absolute; width: 50vw; height: 50vw; background: radial-gradient(circle at center, rgba(124,92,191,0.1) 0%, transparent 70%); top: 50%; left: 50%; transform: translate(-50%,-50%); z-index: -1; }
    
    .panel { background: rgba(18,18,30,0.9); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); border-radius: 32px; padding: 50px; text-align: center; max-width: 500px; width: 90%; animation: slideUp 0.6s cubic-bezier(0.2,0.9,0.4,1.1); box-shadow: 0 40px 100px rgba(0,0,0,0.5); }
    @keyframes slideUp { from { transform:translateY(50px); opacity:0; } to { transform:translateY(0); opacity:1; } }
    
    h1 { font-size: 32px; font-weight: 800; margin-bottom: 12px; }
    p { color: #8888aa; margin-bottom: 30px; font-size: 15px; line-height: 1.5; }
    
    .input-grp { margin-bottom: 24px; text-align: left; }
    .input-grp label { display: block; font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: #8888aa; margin-bottom: 8px; }
    .input-row { display: flex; align-items: center; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; transition: 0.2s; }
    .input-row:focus-within { border-color: #7c5cbf; background: rgba(124,92,191,0.05); }
    .input-prefix { padding: 18px 0 18px 18px; color: #8888aa; font-weight: 600; }
    input { flex: 1; background: transparent; border: none; padding: 18px; color: #fff; font-size: 16px; outline: none; }
    
    .btn { background: linear-gradient(135deg, #7c5cbf, #9b79e0); width: 100%; border: none; padding: 18px; border-radius: 40px; color: #fff; font-size: 16px; font-weight: 700; cursor: pointer; transition: 0.2s; margin-top: 10px; box-shadow: 0 10px 30px rgba(124,92,191,0.3); }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 15px 40px rgba(124,92,191,0.4); }
  </style>
</head>
<body>
  <div class="bg-glow"></div>
  <div class="panel">
    <h1>Initialize Wealth Engine</h1>
    <p>We've created your secure account. Now, establish your baseline to activate predictive AI and auto-saving.</p>
    
    <div class="input-grp">
      <label>Monthly Income Baseline</label>
      <div class="input-row">
        <div class="input-prefix">₹</div>
        <input type="number" id="baseInc" placeholder="e.g. 50000" autocomplete="off">
      </div>
    </div>
    
    <div class="input-grp">
      <label>Primary Financial Goal</label>
      <div class="input-row">
        <input type="text" id="goalTitle" placeholder="e.g. Dream Car, Emergency Fund" autocomplete="off">
      </div>
    </div>
    
    <div class="input-grp" style="margin-bottom: 30px;">
      <label>Target Amount for Goal</label>
      <div class="input-row">
        <div class="input-prefix">₹</div>
        <input type="number" id="goalAmt" placeholder="e.g. 500000" autocomplete="off">
      </div>
    </div>
    
    <button class="btn" id="obBtn" onclick="submitOnboarding()">Activate Flux →</button>
  </div>

  <script>
    async function submitOnboarding() {
      const btn = document.getElementById('obBtn');
      const inc = document.getElementById('baseInc').value;
      const title = document.getElementById('goalTitle').value;
      const amt = document.getElementById('goalAmt').value;
      
      if (!inc || !title || !amt) return alert('Please complete your profile to continue.');
      
      btn.innerText = 'Synchronizing...';
      try {
        // Send income
        const incRes = await fetch('/api/add-income', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ amount: inc, source: 'Baseline Salary' })
        });
        
        // Send Goal
        const goalRes = await fetch('/api/add-goal', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ title: title, target_amount: amt })
        });
        
        if(incRes.ok && goalRes.ok) {
          window.location.href = 'index.html';
        } else {
          alert('Failed to initialize. Try again.');
          btn.innerText = 'Activate Flux →';
        }
      } catch(e) {
        console.error(e);
        btn.innerText = 'Activate Flux →';
      }
    }
  </script>
</body>
</html>
