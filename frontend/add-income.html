<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Income - Flux</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #08080f; --card: #12121e; --border: rgba(255,255,255,0.07);
      --white: #ffffff; --gray: #8888aa; --green: #10b981; --green2: #34d399;
      --orange: #e8491d;
    }
    body { background:var(--bg); color:var(--white); font-family:'Inter', sans-serif; overflow:hidden; height:100vh; display:flex; align-items:center; justify-content:center; }
    
    #bg-canvas { position: absolute; top:0; left:0; width:100%; height:100%; z-index:0; opacity: 0.5; }
    
    .navbar { position:fixed; top:18px; left:50%; transform:translateX(-50%); width:calc(100% - 40px); max-width:1280px; background:rgba(12,12,22,0.82); backdrop-filter:blur(20px); border:1px solid var(--border); border-radius:28px; padding:0 26px; height:68px; display:flex; align-items:center; justify-content:space-between; z-index:1000; }
    .nav-brand { display:flex; align-items:center; gap:12px; text-decoration:none; color: white; font-weight:700; font-size:20px; }
    .nav-logo { width:38px; height:38px; border-radius:14px; background:linear-gradient(135deg,var(--orange),#ff8c42); display:flex; align-items:center; justify-content:center; font-weight:800; }
    .btn-close { color:var(--gray); text-decoration:none; font-size:24px; padding: 0 10px; }
    .btn-close:hover { color:white; }

    .form-container { position:relative; z-index:10; background:rgba(18,18,30,0.7); backdrop-filter:blur(20px); border:1px solid rgba(52,211,153,0.3); border-radius:32px; padding:40px; width:90%; max-width:450px; text-align:center; box-shadow:0 20px 50px rgba(0,0,0,0.5); }
    h2 { font-size:28px; margin-bottom: 24px; font-weight:800; color:var(--green2); }
    
    .input-grp { margin-bottom: 20px; text-align:left; }
    .input-grp label { display:block; font-size:13px; color:var(--gray); margin-bottom:8px; font-weight:600; text-transform:uppercase; letter-spacing:1px; }
    .input-grp input, .input-grp select { width:100%; background:rgba(0,0,0,0.3); border:1px solid var(--border); color:white; padding:16px; border-radius:16px; font-size:16px; transition:0.2s; outline:none; }
    .input-grp input:focus, .input-grp select:focus { border-color:var(--green2); box-shadow:0 0 15px rgba(52,211,153,0.2); }
    
    .btn-submit { background:linear-gradient(135deg,var(--green2),var(--green)); color:#000; width:100%; border:none; padding:16px; border-radius:40px; font-weight:700; font-size:16px; cursor:pointer; margin-top:10px; transition:0.2s; text-decoration:none; display:inline-block; }
    .btn-submit:hover { transform:translateY(-2px); box-shadow:0 10px 25px rgba(16,185,129,0.3); }

  </style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<nav class="navbar">
  <a href="index.html" class="nav-brand"><div class="nav-logo">⚡</div>Flux</a>
  <a href="index.html" class="btn-close">&times;</a>
</nav>

<div class="form-container">
  <h2>Record Income</h2>
  <form id="incomeForm">
    <div class="input-grp">
      <label>Amount (₹)</label>
      <input type="number" id="amt" placeholder="0.00" required>
    </div>
    <div class="input-grp">
      <label>Source</label>
      <select id="src" required>
        <option value="Salary">Salary</option>
        <option value="Freelance">Freelance</option>
        <option value="Investment Return">Investment Return</option>
        <option value="Other">Other</option>
      </select>
    </div>
    <button type="submit" class="btn-submit">Add to Wealth</button>
  </form>
</div>
<script src="app.js"></script>
<script>
  document.getElementById('incomeForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const amt = document.getElementById('amt').value;
    const src = document.getElementById('src').value;
    await addIncome(src, amt);
    window.location.href = 'index.html';
  });
</script>

<script>
  // 3D Background - Rising Green Particles
  window.addEventListener('DOMContentLoaded', () => {
    const canvas = document.getElementById('bg-canvas');
    const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
    camera.position.z = 20;

    const pGeo = new THREE.BufferGeometry();
    const pCount = 300;
    const pPos = new Float32Array(pCount * 3);
    for(let i=0; i<pCount*3; i+=3){
      pPos[i] = (Math.random()-0.5)*40;
      pPos[i+1] = (Math.random()-0.5)*40;
      pPos[i+2] = (Math.random()-0.5)*20;
    }
    pGeo.setAttribute('position', new THREE.BufferAttribute(pPos, 3));
    const pMat = new THREE.PointsMaterial({ color: 0x34d399, size: 0.15, transparent:true, opacity:0.8 });
    const particles = new THREE.Points(pGeo, pMat);
    scene.add(particles);

    function animate() {
      requestAnimationFrame(animate);
      const pos = particles.geometry.attributes.position.array;
      for(let i=1; i<pCount*3; i+=3){
        pos[i] += 0.05; // move up
        if(pos[i] > 20) pos[i] = -20;
      }
      particles.geometry.attributes.position.needsUpdate = true;
      particles.rotation.y += 0.001;
      renderer.render(scene, camera);
    }
    animate();
    
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth/window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  });
</script>
</body>
</html>
