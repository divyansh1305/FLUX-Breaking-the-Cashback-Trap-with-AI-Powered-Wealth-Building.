<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Command Center - Flux AI</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    body { background: #05050a; color: #fff; font-family: 'Inter', sans-serif; padding: 40px; }
    h1 { font-size: 32px; font-weight: 900; margin-bottom: 40px; color: #2563eb; letter-spacing: -1px; }
    .grid { display: grid; grid-template-columns: 300px 1fr; gap: 40px; }
    .sidebar { background: #12121e; padding: 24px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); }
    .user-item { padding: 12px; border-radius: 12px; cursor: pointer; margin-bottom: 8px; font-size: 14px; transition: 0.2s; }
    .user-item:hover { background: rgba(255,255,255,0.05); }
    .user-item.active { background: #2563eb; color: white; }
    
    .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
    .stat-card { background: #12121e; padding: 20px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.05); }
    .stat-val { font-size: 24px; font-weight: 800; color: #34d399; margin-top: 4px; }
    
    .logs-table { width: 100%; border-collapse: collapse; background: #12121e; border-radius: 20px; overflow: hidden; }
    .logs-table th, .logs-table td { padding: 16px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 13px; }
    .logs-table th { background: #181828; color: #8888aa; text-transform: uppercase; letter-spacing: 1px; font-size: 11px; }
    .tag { padding: 4px 8px; border-radius: 6px; font-size: 10px; font-weight: 800; background: rgba(255,255,255,0.1); }
  </style>
</head>
<body>

<h1>⚛️ Flux Admin <span style="font-weight:400; color:#555;">| Agentic Oversight</span></h1>

<div class="grid">
  <div class="sidebar">
    <h3 style="font-size:12px; color:#555; margin-bottom:16px; text-transform:uppercase;">Registered Users</h3>
    <div id="user-list">Loading...</div>
  </div>
  
  <div class="main-content" id="main-content" style="display:none;">
    <div class="stats-row">
      <div class="stat-card">
        <label style="font-size:11px; color:#888;">Total Balance</label>
        <div class="stat-val" id="u-bal">₹0</div>
      </div>
      <div class="stat-card">
        <label style="font-size:11px; color:#888;">Activity Score</label>
        <div class="stat-val" id="u-score" style="color:#a855f7;">0</div>
      </div>
      <div class="stat-card">
        <label style="font-size:11px; color:#888;">Investments</label>
        <div class="stat-val" id="u-inv" style="color:#0ea5e9;">₹0</div>
      </div>
      <div class="stat-card">
        <label style="font-size:11px; color:#888;">Streak</label>
        <div class="stat-val" id="u-streak" style="color:#f59e0b;">0 Days</div>
      </div>
    </div>
    
    <table class="logs-table">
      <thead>
        <tr>
          <th>Timestamp</th>
          <th>Action</th>
          <th>Forensic Trace / Description</th>
        </tr>
      </thead>
      <tbody id="logs-body"></tbody>
    </table>
  </div>
</div>

<script>
  const fmt = (n) => `₹${Number(n).toLocaleString()}`;

  async function loadUsers() {
    const res = await fetch('/api/admin/users');
    const users = await res.json();
    const list = document.getElementById('user-list');
    list.innerHTML = users.map(u => `<div class="user-item" onclick="viewUser(${u.id}, this)"><b>${u.name}</b><br><span style="font-size:11px; opacity:0.6;">${u.email}</span></div>`).join('');
  }

  async function viewUser(id, el) {
    document.querySelectorAll('.user-item').forEach(i => i.classList.remove('active'));
    el.classList.add('active');
    
    const res = await fetch(`/api/admin/user/${id}`);
    const d = await res.json();
    
    document.getElementById('main-content').style.display = 'block';
    document.getElementById('u-bal').innerText = fmt(d.stats.free_balance);
    document.getElementById('u-score').innerText = d.user.points;
    document.getElementById('u-inv').innerText = fmt(d.stats.investments);
    document.getElementById('u-streak').innerText = `${d.user.streak} Days`;
    
    const logs = document.getElementById('logs-body');
    logs.innerHTML = d.activities.map(a => `
      <tr>
        <td style="color:#555;">${new Date(a.timestamp).toLocaleString()}</td>
        <td><span class="tag">${a.action_type}</span></td>
        <td style="color:#aaa;">${a.description}</td>
      </tr>
    `).join('');
  }

  loadUsers();
</script>


<script src="https://cdnjs.cloudflare.com/ajax/libs/annyang/2.6.1/annyang.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="global-voice.js"></script>
</body>
</html>
